<!DOCTYPE html>
<html>
<head>
    <title>Student Performance Predictor</title>

    <style>

        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            width: 400px;
            text-align: center;
            box-shadow: 0px 0px 20px rgba(0,0,0,0.2);
        }

        h1 {
            color: #333;
        }

        input {
            width: 90%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        button {
            background: #007bff;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background: #0056b3;
        }

        .result {
            margin-top: 20px;
            font-size: 22px;
            color: green;
            font-weight: bold;
        }

    </style>
</head>

<body>

<div class="container">

    <h1>Student Performance Predictor</h1>

    <form method="POST">

        <input type="number" step="any" name="study_hours" placeholder="Enter Study Hours" required>

        <input type="number" step="any" name="attendance" placeholder="Enter Attendance %" required>

        <input type="number" step="any" name="sleep_hours" placeholder="Enter Sleep Hours" required>

        <button type="submit">Predict Score</button>

    </form>

    {% if prediction %}
        <div class="result">
            Predicted Score: {{ prediction }}
        </div>
    {% endif %}

</div>

</body>
</html>
